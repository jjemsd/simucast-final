# ============================================================================
# render.yaml — SimuCast deployment blueprint for Render.com
# ============================================================================
# Provisions three resources in one click via Render's Blueprints:
#   1. simucast-db       — managed PostgreSQL
#   2. simucast-api      — Flask backend (gunicorn) with persistent disk
#   3. simucast-web      — React/Vite static site
#
# To deploy:
#   1. Push this repo to GitHub (already on origin).
#   2. In the Render dashboard: New → Blueprint → pick this repo.
#   3. Render reads this file and creates everything.
#   4. After first deploy, set ANTHROPIC_API_KEY in the simucast-api
#      service's Environment tab (it's marked sync:false so it isn't
#      committed or auto-generated).
#
# Notes:
#   - The frontend is built with VITE_API_URL pointing at the backend
#     service's public URL (resolved via fromService).
#   - SECRET_KEY and DATABASE_URL are auto-injected by Render.
#   - Uploads live on a 1 GB disk mounted at backend/uploads. Resize in
#     the dashboard if students upload large CSVs.
# ============================================================================

databases:
  - name: simucast-db
    plan: basic-256mb
    databaseName: simucast
    user: simucast

services:
  # --------------------------------------------------------------------------
  # Backend — Flask API
  # --------------------------------------------------------------------------
  - type: web
    name: simucast-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT "app:create_app()"
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: simucast-uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: simucast-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        fromService:
          type: web
          name: simucast-web
          property: host
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MAX_UPLOAD_MB
        value: "50"

  # --------------------------------------------------------------------------
  # Frontend — Vite static site
  # --------------------------------------------------------------------------
  - type: web
    name: simucast-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    # SPA routing: every non-asset path falls back to index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: simucast-api
          property: host
